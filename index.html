            body, ul{
                margin: 0;

             nav{
                display: flex;
                justify-content: space-between;

            }
            .logo {
                color: #fff;
                font-size: 1.5rem;
                font-weight: bold;

            }
            .logo-container{
                display: flex;
                align-items: center;
                gap: 0.5rem;
                text-decoration: none;
            }
            .logo-container img{
                height: 200px;
                width: auto;
            }
            .logo-text{
                color: #fff;
                font-size: 1.5rem;
                font-weight: bold;
            }
            .menu{
                list-style: none;
                display: flex;
                gap: 1.5rem;
            }
            .menu a{
                columns: #fff;
                text-decoration: none;
                font-size: 1rem;
                transition: color 0.3 ease;
            }
            .menu a:hover{
                color: #ff9800;
            }
            .menu ul li a {
                color: white;
                margin: 0;
                font-weight: bold;
                padding: 8px 15px;
                display: flex; 
            }
            .menu ul li a :hover {
                background-color: rgb(201, 168, 33);
                border-radius: 4px; 
            }
            .btn {
                display: inline-block;
                background-color: #4caf50;
                color: white;
                padding: 12px 24px;
                text-decoration: none;
                font-weight: bold;
                border-radius: 5px;
                transition: background 0.3s;
            }
            .btn :hover{
                background-color: #45a049;
            }
            .intro {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 3rem 2rem;
                flex-wrap: wrap;
            }
            .intro-text {
                flex: 1;
                min-width: 300px;
                padding: 1rem;
            }
            .intro-text h1{
                font-size: 3rem;
                margin-bottom: 1rem;
                color: #333;
            }
            .intro p {
                font-size: 1.2rem;
                color: #555;
                line-height: 1.6;
            }
            .intro-image {
                flex: 1;
                min-width: 40px;
                padding: 1rem;
                text-align: left;
            }
            .intro-image img {
                max-width: 15%;
                height: auto;
                border-radius: 8px;
            }
            .form {
                max-width: 400px;
                margin: auto;
                padding: 20px;
                border: 1px solid #ccc;
                background-color: #f9f9f9;
            }
            .input, textarea {
                width: 100%;
                padding: 10px;
                margin-top: 5px;
                margin-bottom: 15px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }
            footer
            {
                background-color: #614214;
                columns: white;
                padding: 10px;
                position: fixed;
                bottom: 0;
                right: 0;
                width: auto;
                border-top: #ff9800;
            }
            h1{
                text-align: center;
            }
            .popup-overlay{
                position: fixed;
                top: 0;
                bottom: 0;
                width: 100%;
                height: 100%;
                display: none
      
            }

            .popup-box{
                background-attachment: black;
                padding: 20px;
                border-radius: 8px;
                text-align: center;
                width: 300px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.3);

            }
